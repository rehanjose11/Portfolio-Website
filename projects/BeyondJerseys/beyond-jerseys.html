    <!-- Custom Styles -->

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <style>
        /* Smooth, flush layout */
        .project-details-page {
            width: 100%;
            background-color: transparent;
        }
        .project-full-image {
            width: 100%;
            display: block;
            height: auto;
        }
        /* Make sure the reveal-up classes apply immediately */
        .reveal-up {
            opacity: 0;
            filter: blur(10px);
            transform: translateY(100px);
            transition: opacity 1s ease-out, transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 1s ease-out;
            will-change: opacity, transform, filter;
        }
        .reveal-up.is-visible {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0);
        }
    </style>
</head>

        <nav class="bg-zinc-900/30 backdrop-blur-xl border border-white/10 shadow-2xl rounded-full px-6 py-3 w-full max-w-2xl transition-all duration-300">

                <div class="flex items-center">
                    <a href="../../index.html"><img src="../../Homepage%20Assets/logo.png" alt="RJ Logo" class="h-8 w-auto object-contain nav-logo"></a>

                <div class="hidden md:flex items-center gap-6">

                    <a href="../../index.html#about" class="nav-link text-xs font-bold uppercase tracking-widest text-white hover:drop-shadow-[0_0_10px_rgba(255,255,255,1)] transition-all duration-300">About</a>
                    <a href="../../index.html#projects" class="nav-link active text-xs font-bold uppercase tracking-widest text-white hover:drop-shadow-[0_0_10px_rgba(255,255,255,1)] transition-all duration-300">Projects</a>
                    <a href="../../index.html#contact" class="nav-link text-xs font-bold uppercase tracking-widest text-white hover:drop-shadow-[0_0_10px_rgba(255,255,255,1)] transition-all duration-300">Contact</a>
                </div>

                <div class="flex items-center gap-4">
                    <a href="../../RehanJoseResume.pdf" target="_blank"
                        class="hidden sm:flex items-center gap-2 text-xs font-bold uppercase text-white hover:drop-shadow-[0_0_10px_rgba(255,255,255,1)] transition-all duration-300">

                        <i data-lucide="download" class="w-4 h-4"></i>

                    <button id="mobile-menu-toggle" class="md:hidden text-white"><i data-lucide="menu" class="w-5 h-5"></i></button>

    <!-- Project Title Badge (Scrolls to Top) -->
    <a href="#" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;" class="fixed top-6 left-4 lg:left-12 z-[1001] flex items-center px-5 py-3 rounded-full bg-zinc-900/30 backdrop-blur-xl border border-white/10 text-white shadow-xl text-xs font-bold uppercase tracking-widest font-mono cursor-pointer hover:bg-white hover:text-black hover:border-transparent transition-all duration-300" style="margin-top: 8px;">

    </a>

    <!-- Floating Back Button -->
    <a href="../../index.html#projects" class="fixed top-6 right-4 lg:right-12 z-[1001] flex items-center gap-2 px-5 py-3 rounded-full bg-zinc-900/30 backdrop-blur-xl border border-white/10 text-white hover:bg-white hover:text-black hover:border-transparent transition-all duration-300 shadow-xl text-xs font-bold uppercase tracking-widest" style="margin-top: 8px;">

                <a href="../../RehanJoseResume.pdf" target="_blank" class="mobile-nav-link mobile-nav-resume">

        </div>

    <!-- Main Content -->
    <div id="main-content" class="visible project-details-page">
        <!-- Render the long PNG containing the entire case study stretching from the very top -->
        <div class="reveal-up" style="transition-delay: 0.1s;">
            <img src="long.png" alt="Beyond Jerseys Full Case Study" class="project-full-image">
        </div>

        <!-- Render the newly added animated book mockup beneath the main case study -->
        <div class="reveal-up" style="transition-delay: 0.2s;">
            <img src="book.gif" alt="Beyond Jerseys Book Animation" class="project-full-image">
        </div>

        <div class="reveal-up" style="transition-delay: 0.3s;">
            <img src="best-pages.png" alt="Beyond Jerseys Best Pages" class="project-full-image">
        </div>

        <div class="reveal-up" style="transition-delay: 0.4s;">
            <img src="rehan_sports2.jpg" alt="Beyond Jerseys Sports Theme" class="project-full-image">
        </div>

        <!-- Flipbook Section -->
        <section class="book-section pt-16 pb-0 bg-zinc-950 border-t border-zinc-900 reveal-up" style="transition-delay: 0.5s;">
            <div class="text-center mb-16 px-4">
                <h2 class="font-mono text-3xl md:text-5xl font-bold text-white uppercase tracking-widest mb-6">The Full Publication</h2>
                <p class="font-mono text-zinc-400 text-xs md:text-sm tracking-widest uppercase flex items-center justify-center gap-2">
                    <i data-lucide="mouse-pointer-click" class="w-4 h-4"></i>
                    Click and drag corners to flip the pages
                </p>
            </div>
            
            <div class="flipbook-viewport mx-auto w-full max-w-[1400px] aspect-square md:aspect-[2/1] max-h-[85vh] flex justify-center items-center px-4 sm:px-12">
                <div id="flipbook" class="flipbook transition-all">
                    <!-- Pages dynamically injected by JavaScript -->
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="w-full bg-black py-16 flex justify-center items-center">
            <div class="reveal-up text-center">
                <p class="font-mono text-zinc-600 text-xs uppercase tracking-[0.2em]">&copy; REHAN JOSE 2026 ALL RIGHTS RESERVED</p>
            </div>
        </footer>

    </div>

    <!-- Custom JavaScript -->
    <script src="../../script.js"></script>
    <script>
        // Trigger reveal logic on load for subpages since there's no preloader
        setTimeout(() => {
            document.querySelectorAll('.reveal-up').forEach(el => el.classList.add('is-visible'));
        }, 100);

        // --- FLIPBOOK INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            const flipbookElement = document.getElementById('flipbook');
            const totalPages = 64; // Based on files rehan_sports.jpg to rehan_sports64.jpg

            // Dynamically generate page DOM
            for (let i = 1; i <= totalPages; i++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'bg-black overflow-hidden shadow-[inset_0_0_20px_rgba(0,0,0,0.5)]'; // Black background matching the pages
                
                const img = document.createElement('img');
                const fileName = (i === 1) ? 'rehan_sports.jpg' : `rehan_sports${i}.jpg`;
                img.src = `book pages/${fileName}`;
                // Pre-load the first 6 pages for instant quality, lazy load the rest
                if (i > 6) img.loading = 'lazy'; 
                img.className = 'w-full h-full object-contain pointer-events-none';
                
                pageDiv.appendChild(img);
                flipbookElement.appendChild(pageDiv);
            }

            // Initialize StPageFlip with standard Magazine Aspect Ratio
            const pageFlip = new St.PageFlip(flipbookElement, {
                width: 800, // Base square responsive width
                height: 800, // Matching the true 1:1 aspect ratio of the raw pages
                size: "stretch", // Stretches to fill viewport while maintaining aspect ratio
                minWidth: 315,
                maxWidth: 1500, // Increased for crispness on large screens
                minHeight: 315,
                maxHeight: 1500, // Increased for crispness on large screens
                maxShadowOpacity: 0.5,
                showCover: true,
                mobileScrollSupport: false
            });

            // Load generated DOM elements into the logic engine
            pageFlip.loadFromHTML(flipbookElement.querySelectorAll('div'));
        });
    </script>
</body>
</html>
