<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Flip Test</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CRRKNVG7VK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-CRRKNVG7VK');
  </script>
</head>
<body style="background:#333;">
  <div id="book" style="width: 800px; height: 400px; margin: 0 auto;">
    <div class="page" style="background: red;">Page 1</div>
    <div class="page" style="background: green;">Page 2</div>
    <div class="page" style="background: blue;">Page 3</div>
    <div class="page" style="background: yellow;">Page 4</div>
  </div>
  <script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <script>
    var pf = new St.PageFlip(document.getElementById('book'), {
      width: 400, height: 400, showCover: true, usePortrait: false
    });
    pf.loadFromHTML(document.querySelectorAll('.page'));
  </script>
  <style>
    .st-page { background-color: transparent !important; }
  </style>
</body>
</html>
